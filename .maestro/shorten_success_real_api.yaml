appId: com.nubank.shortener
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Shortener"
    timeout: 5000
- tapOn: "https://nubank.com.br"
- inputText: "nubank.com.br"
- tapOn: "Encurtar"
- extendedWaitUntil:
    visible: "Alias gerado"
    timeout: 45000
- assertVisible: "Url encurtada"
- assertVisible: "URL original"
- assertVisible: "https://nubank.com.br"
- assertVisible: "Copiar"
- assertVisible: "Abrir URL"
